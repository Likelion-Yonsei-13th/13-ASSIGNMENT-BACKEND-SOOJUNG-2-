{% load static %}
<!DOCTYPE html>
<html>
<head>
  <title>상품 등록</title>
  <style>
    body { background-color: #f2f2f2; font-family: sans-serif; padding: 40px; }
    input, textarea { width: 100%; padding: 12px; margin: 8px 0; box-sizing: border-box; }
    .btn { background-color: #4CAF50; color: white; padding: 10px 20px; border: none; }
    a { color: purple; text-decoration: none; margin-top: 20px; display: inline-block; }
  </style>
</head>
<body>
  <h2>{{ product.name|default:"상품 등록" }}</h2>
  <form method="POST">
    {% csrf_token %}
    <label>상품명:</label><input type="text" name="name" value="{{ product.name|default:'' }}">
    <label>상품 설명:</label><textarea name="description">{{ product.description|default:'' }}</textarea>
    <label>가격:</label><input type="number" name="price" value="{{ product.price|default:'' }}">
    <button class="btn" type="submit">저장</button>
  </form>
  <a href="{% url 'product_list' %}">← 목록으로</a>
</body>
</html>
