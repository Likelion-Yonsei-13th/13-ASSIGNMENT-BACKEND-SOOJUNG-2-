<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>상품 목록</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 40px;
      background-color: #f9f9f9;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 20px;
    }
    .emoji {
      margin-right: 10px;
    }
    .btn {
      display: inline-block;
      padding: 8px 14px;
      background-color: #3B82F6;
      color: white;
      text-decoration: none;
      border-radius: 5px;
      margin-bottom: 20px;
    }
    table {
      width: 500px;
      border-collapse: collapse;
      background-color: white;
      border: 1px solid #ddd;
    }
    th {
      background-color: #f1f5f9;
      padding: 10px;
      text-align: left;
      border-bottom: 1px solid #ccc;
    }
    td {
      padding: 10px;
      border-bottom: 1px solid #eee;
    }
    tr:hover {
      background-color: #f9f9f9;
    }
    td a {
      color: #2563EB;
      text-decoration: none;
    }
    td a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <h1><span class="emoji">🛍️</span>상품 목록</h1>

  <a href="{% url 'product_create' %}" class="btn">+ 새 상품 등록</a>

  <table>
    <thead>
      <tr>
        <th>상품명</th>
        <th>가격</th>
      </tr>
    </thead>
    <tbody>
      {% for product in products %}
      <tr>
        <td><a href="{% url 'product_detail' product.pk %}">{{ product.name }}</a></td>
        <td>{{ product.price }}원</td>
      </tr>
      {% empty %}
      <tr>
        <td colspan="2">등록된 상품이 없습니다.</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>

</body>
</html>
