{% extends 'base.html' %}
{% load static %}

{% block content %}
<div class="container">
  <h1><span class="emoji">🛍️</span>상품 목록</h1>

  <a href="{% url 'shop:product_create' %}" class="btn btn-blue">+ 새 상품 등록</a>

  <table class="product-table">
    <thead>
      <tr>
        <th>상품명</th>
        <th>가격</th>
      </tr>
    </thead>
    <tbody>
      {% for product in products %}
      <tr>
        <td><a href="{% url 'shop:product_detail' product.pk %}">{{ product.name }}</a></td>
      </tr>
      {% empty %}
      <tr>
        <td colspan="2">등록된 상품이 없습니다.</td>
      </tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
