{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>{% block title %}쇼핑몰{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

  <header class="navbar">
    <div class="navbar-left">
      <img src="{% static 'likelion_yonsei.png' %}" alt="Yonsei Logo" class="logo">
      <h1 class="site-title">멋쟁이 쇼핑몰</h1>
    </div>

    <div class="navbar-right">
      {% if user.is_authenticated %}
        <span class="welcome-msg">안녕하세요, {{ user.profile.nickname|default:user.username }}님</span>
        <a href="{% url 'logout' %}" class="btn btn-gray">로그아웃</a>
      {% else %}
        <a href="{% url 'login' %}" class="btn btn-blue">로그인</a>
        <a href="{% url 'signup' %}" class="btn btn-green">회원가입</a>
      {% endif %}
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

</body>
</html>
